<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake - Crisp & Chill</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="js/cart.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{text-align:center;background:linear-gradient(to bottom right,#b94981,#87b1d3);font-family:"Merriweather",serif;color:black;}
        nav{background:rgba(250,214,214,0.7);padding:14px;font-size:15px;font-weight:bold;}
        nav a{margin:0 12px;text-decoration:none;color:rgb(36,21,88);}
        nav a:hover{color:#d179ae;}
        h1{margin:24px 0 10px;color:white;text-shadow:1px 1px 4px rgba(0,0,0,0.4);}
        .image-container{display:grid;padding:30px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:28px;justify-items:center;}
        .image{width:260px;background:linear-gradient(145deg,#ffe2f1,#d4e8ff);height:400px;border-radius:15px;border:2px solid rgba(255,255,255,0.6);padding:10px;box-shadow:0 8px 20px rgba(0,0,0,0.12);display:flex;flex-direction:column;justify-content:space-between;transition:transform 0.2s,box-shadow 0.3s;}
        .image:hover{transform:translateY(-8px);box-shadow:0 15px 30px rgba(0,70,160,0.25);}
        .image img{height:180px;width:100%;border-radius:10px;object-fit:cover;}
        .price{font-size:17px;font-weight:bold;color:#003b65;}
        .btn{background:linear-gradient(135deg,#b94981,#87b1d3);color:white;padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;transition:0.3s;margin:3px 0;font-size:13px;}
        .btn:hover{opacity:0.85;}
        .nav-user { color: #003a70; font-weight: bold; }
    </style>
</head>
<body>
<nav id="main-nav">
    <a href="index.html">🏠 Home</a>
    <a href="cart.html">🛒 Cart <span id="cart-count" style="display:none;background:#ff4f9d;color:white;border-radius:50%;padding:1px 6px;font-size:11px;">0</span></a>
    <a href="orders.html">My Orders</a>
</nav>
<h1>🎂 Cake Gallery</h1>
<div class="image-container">
    <div class="image"><img src="Images/chocolatecake.jpg" alt="Chocolate Cake"><h4>Chocolate Cake</h4><p class="price">₹350</p><button class="btn" onclick="addToCart('Chocolate Cake',350,'Images/chocolatecake.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Chocolate Cake',350)">Order Now</button></div>
    <div class="image"><img src="Images/vanillacake.jpg" alt="Vanilla Cake"><h4>Vanilla Cake</h4><p class="price">₹300</p><button class="btn" onclick="addToCart('Vanilla Cake',300,'Images/vanillacake.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Vanilla Cake',300)">Order Now</button></div>
    <div class="image"><img src="Images/red_velvet.jpg" alt="Red Velvet"><h4>Red Velvet Cake</h4><p class="price">₹450</p><button class="btn" onclick="addToCart('Red Velvet Cake',450,'Images/red_velvet.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Red Velvet Cake',450)">Order Now</button></div>
    <div class="image"><img src="Images/black_forest.jpg" alt="Black Forest"><h4>Black Forest Cake</h4><p class="price">₹400</p><button class="btn" onclick="addToCart('Black Forest Cake',400,'Images/black_forest.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Black Forest Cake',400)">Order Now</button></div>
    <div class="image"><img src="Images/Fruitcake.png" alt="Fruit Cake"><h4>Fruit Cake</h4><p class="price">₹380</p><button class="btn" onclick="addToCart('Fruit Cake',380,'Images/Fruitcake.png')">Add to Cart</button><button class="btn" onclick="orderNow('Fruit Cake',380)">Order Now</button></div>
    <div class="image"><img src="Images/cheesecake.jpg" alt="Cheesecake"><h4>Cheesecake</h4><p class="price">₹500</p><button class="btn" onclick="addToCart('Cheesecake',500,'Images/cheesecake.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Cheesecake',500)">Order Now</button></div>
</div>
<script>
function updateNav() {
    const loggedIn = localStorage.getItem('userLoggedIn') === 'true';
    const user = loggedIn ? JSON.parse(localStorage.getItem('userData') || '{}') : null;
    if (loggedIn && user) {
        const nav = document.getElementById('main-nav');
        const cartLink = nav.querySelector('a[href="cart.html"]');
        const welcome = document.createElement('span');
        welcome.className = 'nav-user';
        welcome.textContent = 'Hi, ' + (user.firstName || user.email);
        const logout = document.createElement('a');
        logout.href = '#';
        logout.textContent = 'Logout';
        logout.style.color = '#ff4f9d';
        logout.onclick = function() {
            localStorage.removeItem('userLoggedIn');
            localStorage.removeItem('userData');
            localStorage.removeItem('cartItems');
            location.reload();
        };
        nav.insertBefore(logout, cartLink);
        nav.insertBefore(welcome, logout);
    }
}
window.addEventListener('load', function() {
    updateNav();
});
</script>
</body>
</html>
