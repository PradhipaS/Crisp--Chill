<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Crisp & Chill</title>
    <script src="js/api.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(to bottom right, #b94981, #87b1d3); padding: 20px; }
        .back-link { position: absolute; top: 20px; left: 20px; }
        .back-link a { background: rgba(255,255,255,0.9); color: #003a70; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .back-link a:hover { background: white; }
        .container { background: rgba(255,255,255,0.97); padding: 40px 32px; border-radius: 16px; box-shadow: 0 12px 30px rgba(0,0,0,0.25); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 40px; margin-bottom: 8px; }
        h1 { color: #003a70; font-size: 26px; margin-bottom: 6px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 28px; }
        label { display: block; text-align: left; font-size: 14px; color: #444; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px 15px; margin-bottom: 18px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; transition: border 0.2s; }
        input:focus { outline: none; border-color: #b94981; }
        button { width: 100%; padding: 13px; background: linear-gradient(135deg, #b94981, #87b1d3); color: white; font-size: 16px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .msg { margin-top: 14px; padding: 10px; border-radius: 8px; font-size: 14px; display: none; }
        .msg.error { background: #ffe0e0; color: #c0392b; display: block; }
        .msg.success { background: #e0ffe0; color: #27ae60; display: block; }
        .signup-link { margin-top: 22px; font-size: 14px; color: #666; }
        .signup-link a { color: #b94981; font-weight: bold; text-decoration: none; }
        .signup-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="back-link"><a href="index.html">← Home</a></div>

    <div class="container">
        <div class="logo">🍔</div>
        <h1>Welcome Back!</h1>
        <p class="subtitle">Login to your Crisp &amp; Chill account</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>

            <button type="submit" id="loginBtn">Login</button>
        </form>

        <div id="msg" class="msg"></div>

        <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Logging in...';
            msg.className = 'msg';
            msg.style.display = 'none';

            try {
                const res = await apiLogin({ email, password });
                if (res.success) {
                    setSession(res.user);
                    msg.className = 'msg success';
                    msg.textContent = 'Login successful! Redirecting...';
                    setTimeout(() => { window.location.href = 'index.html'; }, 800);
                } else {
                    throw new Error(res.message || 'Invalid credentials');
                }
            } catch (err) {
                // Fallback: if backend is down, check localStorage (dev mode)
                const stored = localStorage.getItem('devUsers');
                const users = stored ? JSON.parse(stored) : [];
                const match = users.find(u => u.email === email && u.password === password);
                if (match) {
                    setSession({ firstName: match.firstName, lastName: match.lastName, email: match.email, phone: match.phone });
                    msg.className = 'msg success';
                    msg.textContent = 'Login successful! Redirecting...';
                    setTimeout(() => { window.location.href = 'index.html'; }, 800);
                } else {
                    msg.className = 'msg error';
                    msg.textContent = err.message.includes('fetch') ? 'Cannot connect to server. Check if backend is running.' : err.message;
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }
    </script>
</body>
</html>
