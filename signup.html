<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Crisp & Chill</title>
    <script src="js/api.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(to bottom right, #b94981, #87b1d3); padding: 20px; }
        .back-link { position: absolute; top: 20px; left: 20px; }
        .back-link a { background: rgba(255,255,255,0.9); color: #003a70; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .back-link a:hover { background: white; }
        .container { background: rgba(255,255,255,0.97); padding: 36px 32px; border-radius: 16px; box-shadow: 0 12px 30px rgba(0,0,0,0.25); width: 100%; max-width: 460px; text-align: center; }
        .logo { font-size: 40px; margin-bottom: 8px; }
        h1 { color: #003a70; font-size: 26px; margin-bottom: 6px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
        label { display: block; text-align: left; font-size: 14px; color: #444; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 11px 14px; margin-bottom: 16px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; transition: border 0.2s; }
        input:focus { outline: none; border-color: #b94981; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .row input { margin-bottom: 0; }
        .row-wrap { margin-bottom: 16px; }
        button { width: 100%; padding: 13px; background: linear-gradient(135deg, #b94981, #87b1d3); color: white; font-size: 16px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-top: 6px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .msg { margin-top: 14px; padding: 10px; border-radius: 8px; font-size: 14px; display: none; }
        .msg.error { background: #ffe0e0; color: #c0392b; display: block; }
        .msg.success { background: #e0ffe0; color: #27ae60; display: block; }
        .login-link { margin-top: 20px; font-size: 14px; color: #666; }
        .login-link a { color: #b94981; font-weight: bold; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        @media (max-width: 480px) { .row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="back-link"><a href="index.html">🏠 Home</a></div>

    <div class="container">
        <div class="logo">Crisp & Chill</div>
        <h1>Create Account</h1>
        <p class="subtitle">Join Crisp &amp; Chill for amazing food!</p>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="row-wrap">
                <div class="row">
                    <div>
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" placeholder="First name" required>
                    </div>
                    <div>
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" placeholder="Last name" required>
                    </div>
                </div>
            </div>

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter phone number" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a password (min 6 chars)" required minlength="6">

            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>

            <button type="submit" id="signupBtn">Create Account</button>
        </form>

        <div id="msg" class="msg"></div>

        <div class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        async function handleSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            const msg = document.getElementById('msg');
            const firstName = document.getElementById('firstName').value.trim();
            const lastName  = document.getElementById('lastName').value.trim();
            const email     = document.getElementById('email').value.trim();
            const phone     = document.getElementById('phone').value.trim();
            const password  = document.getElementById('password').value;
            const confirm   = document.getElementById('confirmPassword').value;

            msg.className = 'msg';
            msg.style.display = 'none';

            if (password !== confirm) {
                msg.className = 'msg error';
                msg.textContent = 'Passwords do not match!';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const res = await apiSignup({ firstName, lastName, email, password, phone });
                if (res.success) {
                    setSession(res.user);
                    msg.className = 'msg success';
                    msg.textContent = 'Account created! Welcome to Crisp & Chill!';
                    setTimeout(() => { window.location.href = 'index.html'; }, 900);
                } else {
                    throw new Error(res.message || 'Signup failed');
                }
            } catch (err) {
                // Fallback: store locally if backend is down
                if (err.message.includes('fetch')) {
                    const users = JSON.parse(localStorage.getItem('devUsers') || '[]');
                    if (users.find(u => u.email === email)) {
                        msg.className = 'msg error';
                        msg.textContent = 'Email already registered.';
                    } else {
                        users.push({ firstName, lastName, email, phone, password });
                        localStorage.setItem('devUsers', JSON.stringify(users));
                        setSession({ firstName, lastName, email, phone });
                        msg.className = 'msg success';
                        msg.textContent = 'Account created (offline mode)! Redirecting...';
                        setTimeout(() => { window.location.href = 'index.html'; }, 900);
                    }
                } else {
                    msg.className = 'msg error';
                    msg.textContent = err.message;
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }
    </script>
</body>
</html>
