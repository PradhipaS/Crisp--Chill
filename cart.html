<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Crisp & Chill</title>
    <script src="js/cart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: linear-gradient(to bottom right, #b94981, #87b1d3); min-height: 100vh; }
        nav { background: rgba(250,214,214,0.7); padding: 15px; font-size: 16px; font-weight: bold; text-align: center; }
        nav a { margin: 0 14px; text-decoration: none; color: rgb(36,21,88); }
        nav a:hover { color: #d179ae; }
        .page-title { text-align: center; color: white; padding: 30px 20px 10px; font-size: 28px; text-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .cart-container { max-width: 800px; margin: 20px auto 40px; padding: 0 16px; }
        .empty-cart { text-align: center; background: rgba(255,255,255,0.9); border-radius: 16px; padding: 60px 20px; color: #666; }
        .empty-cart .icon { font-size: 64px; margin-bottom: 16px; }
        .empty-cart h2 { color: #003a70; margin-bottom: 10px; }
        .empty-cart a { display: inline-block; margin-top: 20px; padding: 12px 28px; background: linear-gradient(135deg, #b94981, #87b1d3); color: white; border-radius: 10px; text-decoration: none; font-weight: bold; }
        .cart-item { background: rgba(255,255,255,0.95); border-radius: 14px; padding: 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 16px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .cart-item img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
        .item-info { flex: 1; }
        .item-info h3 { color: #003a70; font-size: 16px; margin-bottom: 4px; }
        .item-info .price { color: #b94981; font-weight: bold; font-size: 15px; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: linear-gradient(135deg, #b94981, #87b1d3); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-btn:hover { opacity: 0.85; }
        .qty-num { font-weight: bold; font-size: 16px; min-width: 24px; text-align: center; }
        .remove-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #e74c3c; padding: 4px; }
        .remove-btn:hover { transform: scale(1.2); }
        .cart-summary { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 24px; margin-top: 20px; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 15px; color: #444; border-bottom: 1px solid #eee; }
        .summary-row.total { font-size: 20px; font-weight: bold; color: #003a70; border-bottom: none; padding-top: 14px; }
        .checkout-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #b94981, #87b1d3); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 16px; transition: 0.3s; }
        .checkout-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .clear-btn { width: 100%; padding: 11px; background: none; border: 2px solid #e74c3c; color: #e74c3c; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .clear-btn:hover { background: #e74c3c; color: white; }
        .nav-user { color: #003a70; font-weight: bold; }
    </style>
</head>
<body>
    <nav id="main-nav">
        <a href="index.html">🏠 Home</a>
        <a href="orders.html">My Orders</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html" style="color:#b94981;">🛒 Cart <span id="cart-count" style="display:none;background:#ff4f9d;color:white;border-radius:50%;padding:1px 6px;font-size:11px;">0</span></a>
    </nav>

    <h1 class="page-title">🛒 Your Cart</h1>

    <div class="cart-container" id="cartContainer"></div>

    <script>
        function updateNav() {
            const loggedIn = localStorage.getItem('userLoggedIn') === 'true';
            const user = loggedIn ? JSON.parse(localStorage.getItem('userData') || '{}') : null;
            if (loggedIn && user) {
                const nav = document.getElementById('main-nav');
                const cartLink = nav.querySelector('a[href="cart.html"]');
                const welcome = document.createElement('span');
                welcome.className = 'nav-user';
                welcome.textContent = 'Hi, ' + (user.firstName || user.email);
                const logout = document.createElement('a');
                logout.href = '#';
                logout.textContent = 'Logout';
                logout.style.color = '#ff4f9d';
                logout.onclick = function() {
                    localStorage.removeItem('userLoggedIn');
                    localStorage.removeItem('userData');
                    localStorage.removeItem('cartItems');
                    location.reload();
                };
                nav.insertBefore(logout, cartLink);
                nav.insertBefore(welcome, logout);
            }
        }
        window.addEventListener('load', function() {
            updateNav();
        });

        function renderCart() {
            const items = getCartItems();
            const container = document.getElementById('cartContainer');

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <h2>Your cart is empty</h2>
                        <p>Add some delicious items from our menu!</p>
                        <a href="index.html">Browse Menu</a>
                    </div>`;
                return;
            }

            let html = '';
            items.forEach(item => {
                html += `
                <div class="cart-item">
                    <img src="${item.image || 'Images/burger.jpg'}" alt="${item.name}" onerror="this.src='Images/burger.jpg'">
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <div class="price">₹${item.price} each</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
                        <span class="qty-num">${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                    </div>
                    <div style="font-weight:bold;color:#003a70;min-width:60px;text-align:right;">₹${item.price * item.quantity}</div>
                    <button class="remove-btn" onclick="deleteItem(${item.id})" title="Remove">🗑️</button>
                </div>`;
            });

            const subtotal = getCartTotal();
            const delivery = subtotal > 0 ? 40 : 0;
            const total = subtotal + delivery;

            html += `
            <div class="cart-summary">
                <div class="summary-row"><span>Subtotal</span><span>₹${subtotal}</span></div>
                <div class="summary-row"><span>Delivery</span><span>₹${delivery}</span></div>
                <div class="summary-row total"><span>Total</span><span>₹${total}</span></div>
                <button class="checkout-btn" onclick="goCheckout(${total})">Proceed to Checkout →</button>
                <button class="clear-btn" onclick="clearAll()">Clear Cart</button>
            </div>`;

            container.innerHTML = html;
        }

        function changeQty(id, delta) {
            updateQuantity(id, delta);
            renderCart();
        }

        function deleteItem(id) {
            removeFromCart(id);
            renderCart();
        }

        function clearAll() {
            if (confirm('Clear all items from cart?')) {
                clearCart();
                renderCart();
            }
        }

        function goCheckout(total) {
            if (!isUserLoggedIn()) {
                alert('Please login to checkout.');
                window.location.href = 'login.html';
                return;
            }
            localStorage.setItem('checkoutTotal', total);
            window.location.href = 'payment.html';
        }

        renderCart();
    </script>
</body>
</html>
