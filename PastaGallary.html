<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasta - Crisp & Chill</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="js/cart.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{text-align:center;background:linear-gradient(to bottom right,#b94981,#87b1d3);font-family:"Merriweather",serif;color:black;}
        nav{background:rgba(250,214,214,0.7);padding:14px;font-size:15px;font-weight:bold;}
        nav a{margin:0 12px;text-decoration:none;color:rgb(36,21,88);}
        nav a:hover{color:#d179ae;}
        #nav-user{background:rgba(250,214,214,0.7);padding:5px;font-size:14px;text-align:center;}
        h1{margin:24px 0 10px;color:white;text-shadow:1px 1px 4px rgba(0,0,0,0.4);}
        .image-container{display:grid;padding:30px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:28px;justify-items:center;}
        .image{width:260px;background:linear-gradient(145deg,#ffe8d6,#ffe1eb);height:400px;border-radius:15px;border:2px solid rgba(255,255,255,0.6);padding:10px;box-shadow:0 8px 20px rgba(0,0,0,0.12);display:flex;flex-direction:column;justify-content:space-between;transition:transform 0.2s,box-shadow 0.3s;}
        .image:hover{transform:translateY(-8px);box-shadow:0 15px 30px rgba(160,0,0,0.25);}
        .image img{height:180px;width:100%;border-radius:10px;object-fit:cover;}
        .price{font-size:17px;font-weight:bold;color:#8b0000;}
        .btn{background:linear-gradient(135deg,#b94981,#87b1d3);color:white;padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;transition:0.3s;margin:3px 0;font-size:13px;}
        .btn:hover{opacity:0.85;}
    </style>
</head>
<body>
<nav id="main-nav">
    <a href="index.html">🏠 Home</a>
    <a href="cart.html">🛒 Cart <span id="cart-count" style="display:none;background:#ff4f9d;color:white;border-radius:50%;padding:1px 6px;font-size:11px;">0</span></a>
    <a href="orders.html">My Orders</a>
</nav>
<div id="nav-user" style="display:none;">Welcome, <span id="user-name"></span> | <a href="#" onclick="logout()">Logout</a></div>
<h1>🍝 Pasta Gallery</h1>
<div class="image-container">
    <div class="image"><img src="Images/Alferdo.jpg" alt="Alfredo Pasta"><h4>Alfredo Pasta</h4><p class="price">₹180</p><button class="btn" onclick="addToCart('Alfredo Pasta',180,'Images/Alferdo.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Alfredo Pasta',180)">Order Now</button></div>
    <div class="image"><img src="Images/white_sauce_pasta.png" alt="White Sauce Pasta"><h4>White Sauce Pasta</h4><p class="price">₹160</p><button class="btn" onclick="addToCart('White Sauce Pasta',160,'Images/white_sauce_pasta.png')">Add to Cart</button><button class="btn" onclick="orderNow('White Sauce Pasta',160)">Order Now</button></div>
    <div class="image"><img src="Images/red_sauce.jpg" alt="Red Sauce Pasta"><h4>Red Sauce Pasta</h4><p class="price">₹150</p><button class="btn" onclick="addToCart('Red Sauce Pasta',150,'Images/red_sauce.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Red Sauce Pasta',150)">Order Now</button></div>
    <div class="image"><img src="Images/Macronni.jpg" alt="Macaroni Cheese"><h4>Macaroni Cheese</h4><p class="price">₹170</p><button class="btn" onclick="addToCart('Macaroni Cheese',170,'Images/Macronni.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Macaroni Cheese',170)">Order Now</button></div>
    <div class="image"><img src="Images/veg_pasta.jpg" alt="Veg Pasta"><h4>Veg Pasta</h4><p class="price">₹140</p><button class="btn" onclick="addToCart('Veg Pasta',140,'Images/veg_pasta.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Veg Pasta',140)">Order Now</button></div>
    <div class="image"><img src="Images/chicken_pasta.jpg" alt="Chicken Pasta"><h4>Chicken Pasta</h4><p class="price">₹190</p><button class="btn" onclick="addToCart('Chicken Pasta',190,'Images/chicken_pasta.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Chicken Pasta',190)">Order Now</button></div>
</div>
<script>
updateNav();
</script>
</body>
</html>
