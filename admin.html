<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Crisp & Chill</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: linear-gradient(to bottom right, #b94981, #87b1d3); min-height: 100vh; }

        /* Login screen */
        .login-screen {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: white; border-radius: 16px; padding: 40px 32px;
            width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        }
        .login-box .icon { font-size: 48px; margin-bottom: 10px; }
        .login-box h2 { color: #003a70; margin-bottom: 6px; }
        .login-box p  { color: #888; font-size: 14px; margin-bottom: 24px; }
        .login-box input {
            width: 100%; padding: 11px 14px; margin-bottom: 14px;
            border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px;
        }
        .login-box input:focus { outline: none; border-color: #b94981; }
        .login-box button {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #b94981, #87b1d3);
            color: white; border: none; border-radius: 10px;
            font-size: 15px; font-weight: bold; cursor: pointer;
        }
        .login-box button:hover { opacity: 0.9; }
        .login-err { color: #c0392b; font-size: 13px; margin-top: 10px; display: none; }

        /* Dashboard */
        .dashboard { display: none; }
        header {
            background: rgba(250,214,214,0.85);
            padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }
        header h1 { color: #003a70; font-size: 20px; }
        .header-right { display: flex; align-items: center; gap: 14px; }
        .badge-count {
            background: linear-gradient(135deg, #b94981, #87b1d3);
            color: white; border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: bold;
        }
        .logout-btn {
            background: none; border: 2px solid #b94981; color: #b94981;
            padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 13px;
        }
        .logout-btn:hover { background: #b94981; color: white; }

        /* Tabs */
        .tabs {
            display: flex; gap: 0; background: rgba(255,255,255,0.2);
            padding: 12px 20px; overflow-x: auto;
        }
        .tab {
            padding: 9px 20px; border-radius: 20px; cursor: pointer;
            font-weight: bold; font-size: 14px; color: white;
            white-space: nowrap; transition: 0.2s;
        }
        .tab.active { background: white; color: #b94981; }
        .tab:hover:not(.active) { background: rgba(255,255,255,0.25); }

        /* Content */
        .content { max-width: 1000px; margin: 24px auto 50px; padding: 0 16px; }

        .empty-state {
            background: rgba(255,255,255,0.9); border-radius: 14px;
            padding: 50px 20px; text-align: center; color: #888;
        }
        .empty-state .icon { font-size: 52px; margin-bottom: 12px; }

        /* Order card */
        .order-card {
            background: white; border-radius: 14px; padding: 20px;
            margin-bottom: 16px; box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            border-left: 5px solid #ddd; transition: border-color 0.3s;
        }
        .order-card.border-pending         { border-left-color: #f0ad4e; }
        .order-card.border-confirmed       { border-left-color: #17a2b8; }
        .order-card.border-preparing       { border-left-color: #fd7e14; }
        .order-card.border-out-for-delivery{ border-left-color: #007bff; }
        .order-card.border-delivered       { border-left-color: #28a745; }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
        .order-meta h3 { color: #003a70; font-size: 16px; margin-bottom: 4px; }
        .order-meta p  { color: #666; font-size: 13px; }
        .status-badge { padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; white-space: nowrap; }
        .badge-pending          { background: #fff3cd; color: #856404; }
        .badge-confirmed        { background: #d1ecf1; color: #0c5460; }
        .badge-preparing        { background: #ffe5b4; color: #7a4f00; }
        .badge-out-for-delivery { background: #cce5ff; color: #004085; }
        .badge-delivered        { background: #d4edda; color: #155724; }

        .items-list { border-top: 1px solid #eee; padding-top: 12px; margin-bottom: 14px; }
        .item-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; color: #444; }
        .order-total-row { display: flex; justify-content: space-between; border-top: 1px solid #eee; padding-top: 10px; font-weight: bold; color: #003a70; font-size: 15px; }

        /* Action buttons */
        .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
        .action-btn {
            padding: 8px 16px; border: none; border-radius: 8px;
            font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .action-btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-confirm   { background: #17a2b8; color: white; }
        .btn-prepare   { background: #fd7e14; color: white; }
        .btn-dispatch  { background: #007bff; color: white; }
        .btn-deliver   { background: #28a745; color: white; }
        .btn-cancel    { background: #dc3545; color: white; }

        /* Stats bar */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .stat-card { background: rgba(255,255,255,0.9); border-radius: 12px; padding: 16px; text-align: center; }
        .stat-card .num { font-size: 28px; font-weight: bold; color: #b94981; }
        .stat-card .lbl { font-size: 12px; color: #666; margin-top: 4px; }

        /* Notification toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: linear-gradient(135deg, #b94981, #87b1d3);
            color: white; padding: 12px 20px; border-radius: 10px;
            font-weight: bold; font-size: 14px; z-index: 9999;
            box-shadow: 0 4px 15px rgba(185,73,129,0.4);
            animation: slideUp 0.3s ease;
            display: none;
        }
        @keyframes slideUp {
            from { opacity:0; transform: translateY(20px); }
            to   { opacity:1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- ADMIN LOGIN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <div class="icon">🔐</div>
        <h2>Hotel Admin</h2>
        <p>Crisp &amp; Chill Order Management</p>
        <input type="text"     id="adminUser" placeholder="Username" />
        <input type="password" id="adminPass" placeholder="Password" onkeydown="if(event.key==='Enter') adminLogin()" />
        <button onclick="adminLogin()">Login to Dashboard</button>
        <div class="login-err" id="loginErr">Invalid credentials. Try admin / admin123</div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <header>
        <h1>Crisp &amp; Chill — Order Dashboard</h1>
        <div class="header-right">
            <span class="badge-count" id="newOrderBadge">0 New</span>
            <button class="logout-btn" onclick="adminLogout()">Logout</button>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('all',this)">All Orders</div>
        <div class="tab" onclick="switchTab('Pending',this)">Pending</div>
        <div class="tab" onclick="switchTab('Confirmed',this)">Confirmed</div>
        <div class="tab" onclick="switchTab('Preparing',this)">Preparing</div>
        <div class="tab" onclick="switchTab('Out for Delivery',this)">Out for Delivery</div>
        <div class="tab" onclick="switchTab('Delivered',this)">Delivered</div>
    </div>

    <div class="content">
        <div class="stats" id="statsBar"></div>
        <div id="ordersPanel"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // —— Admin credentials (simple, frontend-only) ————
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin123';

    let currentTab = 'all';

    // â”€â”€ Login â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function adminLogin() {
        const u = document.getElementById('adminUser').value.trim();
        const p = document.getElementById('adminPass').value;
        if (u === ADMIN_USER && p === ADMIN_PASS) {
            sessionStorage.setItem('adminLoggedIn', 'true');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            render();
            setInterval(render, 8000); // auto-refresh every 8s
        } else {
            document.getElementById('loginErr').style.display = 'block';
        }
    }

    function adminLogout() {
        sessionStorage.removeItem('adminLoggedIn');
        location.reload();
    }

    // Auto-restore session
    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        setTimeout(() => { render(); setInterval(render, 8000); }, 0);
    }

    // â”€â”€ Data helpers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function getOrders() {
        return JSON.parse(localStorage.getItem('allOrders') || '[]');
    }

    function saveOrders(orders) {
        localStorage.setItem('allOrders', JSON.stringify(orders));
    }

    function updateStatus(orderId, newStatus) {
        const orders = getOrders();
        const idx = orders.findIndex(o => (o.id || o.orderId) === orderId);
        if (idx > -1) {
            orders[idx].status = newStatus;
            saveOrders(orders);
            // Also sync into myOrders so customer sees update
            const mine = JSON.parse(localStorage.getItem('myOrders') || '[]');
            const mi = mine.findIndex(o => (o.id || o.orderId) === orderId);
            if (mi > -1) { mine[mi].status = newStatus; localStorage.setItem('myOrders', JSON.stringify(mine)); }
            showToast(`Order #${orderId} → ${newStatus}`);
            render();
        }
    }

    // â”€â”€ Tab â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function switchTab(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    // â”€â”€ Stats â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function renderStats(orders) {
        const counts = { Pending:0, Confirmed:0, Preparing:0, 'Out for Delivery':0, Delivered:0 };
        let revenue = 0;
        orders.forEach(o => {
            const s = o.status || 'Pending';
            if (counts[s] !== undefined) counts[s]++;
            if (s === 'Delivered') revenue += (o.totalAmount || o.total || 0);
        });
        document.getElementById('statsBar').innerHTML = `
            <div class="stat-card"><div class="num">${orders.length}</div><div class="lbl">Total Orders</div></div>
            <div class="stat-card"><div class="num">${counts['Pending']}</div><div class="lbl">Pending</div></div>
            <div class="stat-card"><div class="num">${counts['Preparing']}</div><div class="lbl">Preparing</div></div>
            <div class="stat-card"><div class="num">${counts['Out for Delivery']}</div><div class="lbl">On the Way</div></div>
            <div class="stat-card"><div class="num">${counts['Delivered']}</div><div class="lbl">Delivered</div></div>
            <div class="stat-card"><div class="num">₹${revenue}</div><div class="lbl">Revenue</div></div>
        `;
        document.getElementById('newOrderBadge').textContent = counts['Pending'] + ' New';
    }

    // â”€â”€ Badge class â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function badgeClass(s) {
        return 'badge-' + (s || 'pending').toLowerCase().replace(/\s+/g, '-');
    }
    function borderClass(s) {
        return 'border-' + (s || 'pending').toLowerCase().replace(/\s+/g, '-');
    }

    // â”€â”€ Action buttons per status â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function actionButtons(order) {
        const id = order.id || order.orderId;
        const s  = order.status || 'Pending';
        let btns = '';
        if (s === 'Pending')           btns += `<button class="action-btn btn-confirm"  onclick="updateStatus('${id}','Confirmed')">Confirm</button>`;
        if (s === 'Confirmed')         btns += `<button class="action-btn btn-prepare"  onclick="updateStatus('${id}','Preparing')">Start Preparing</button>`;
        if (s === 'Preparing')         btns += `<button class="action-btn btn-dispatch" onclick="updateStatus('${id}','Out for Delivery')">Dispatch</button>`;
        if (s === 'Out for Delivery')  btns += `<button class="action-btn btn-deliver"  onclick="updateStatus('${id}','Delivered')">Mark Delivered</button>`;
        if (s !== 'Delivered' && s !== 'Cancelled')
            btns += `<button class="action-btn btn-cancel" onclick="updateStatus('${id}','Cancelled')">Cancel</button>`;
        return btns;
    }

    // â”€â”€ Main render â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function render() {
        const all = getOrders();
        renderStats(all);

        const filtered = currentTab === 'all' ? all : all.filter(o => (o.status || 'Pending') === currentTab);
        const panel = document.getElementById('ordersPanel');

        if (filtered.length === 0) {
            panel.innerHTML = `<div class="empty-state"><div class="icon">📦</div><p>No orders in this category.</p></div>`;
            return;
        }

        panel.innerHTML = filtered.map(order => {
            const items  = order.items || order.orderItems || [];
            const status = order.status || 'Pending';
            const id     = order.id || order.orderId;
            return `
            <div class="order-card ${borderClass(status)}">
                <div class="card-top">
                    <div class="order-meta">
                        <h3>Order #${id}</h3>
                        <p>${order.customerName || 'Customer'} &nbsp;|&nbsp; ${order.customerEmail || 'â€”'}</p>
                        <p>${order.address || 'â€”'} &nbsp;|&nbsp; ${order.paymentMethod || 'â€”'}</p>
                        <p>${order.date || ''} ${order.time || ''}</p>
                    </div>
                    <span class="status-badge ${badgeClass(status)}">${status}</span>
                </div>
                <div class="items-list">
                    ${items.map(i => `<div class="item-row"><span>${i.productName || i.name} × ${i.quantity}</span><span>₹${(i.price || i.unitPrice) * i.quantity}</span></div>`).join('')}
                    <div class="order-total-row"><span>Total</span><span>₹${order.totalAmount || order.total}</span></div>
                </div>
                <div class="actions">${actionButtons(order)}</div>
            </div>`;
        }).join('');
    }

    // â”€â”€ Toast â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2800);
    }
</script>
</body>
</html>
