<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Crisp & Chill</title>
    <script src="js/api.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: linear-gradient(to bottom right, #b94981, #87b1d3); min-height: 100vh; }
        nav { background: rgba(250,214,214,0.7); padding: 15px; font-size: 16px; font-weight: bold; text-align: center; }
        nav a { margin: 0 14px; text-decoration: none; color: rgb(36,21,88); }
        nav a:hover { color: #d179ae; }
        .page-title { text-align: center; color: white; padding: 30px 20px 10px; font-size: 28px; text-shadow: 1px 1px 4px rgba(0,0,0,0.3); }
        .container { max-width: 820px; margin: 20px auto 50px; padding: 0 16px; }
        .login-prompt { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 50px 20px; text-align: center; }
        .login-prompt .icon { font-size: 56px; margin-bottom: 14px; }
        .login-prompt h2 { color: #003a70; margin-bottom: 10px; }
        .login-prompt a { display: inline-block; margin-top: 18px; padding: 12px 28px; background: linear-gradient(135deg, #b94981, #87b1d3); color: white; border-radius: 10px; text-decoration: none; font-weight: bold; }
        .order-card { background: rgba(255,255,255,0.97); border-radius: 14px; padding: 20px; margin-bottom: 18px; box-shadow: 0 3px 12px rgba(0,0,0,0.12); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
        .order-id { font-weight: bold; color: #003a70; font-size: 15px; }
        .order-date { color: #888; font-size: 13px; margin-top: 2px; }
        .status-badge { padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .status-pending        { background: #fff3cd; color: #856404; }
        .status-confirmed      { background: #d1ecf1; color: #0c5460; }
        .status-preparing      { background: #ffe5b4; color: #7a4f00; }
        .status-out-for-delivery { background: #cce5ff; color: #004085; }
        .status-delivered      { background: #d4edda; color: #155724; }
        .order-items { border-top: 1px solid #eee; padding-top: 12px; }
        .order-item-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; color: #444; }
        .order-total { display: flex; justify-content: space-between; border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px; font-weight: bold; color: #003a70; }

        /* Status tracker */
        .tracker { display: flex; align-items: center; margin-top: 16px; padding-top: 14px; border-top: 1px solid #eee; overflow-x: auto; }
        .step { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 70px; }
        .step-dot { width: 28px; height: 28px; border-radius: 50%; border: 3px solid #ddd; background: white; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: 0.3s; }
        .step-dot.done { background: linear-gradient(135deg, #b94981, #87b1d3); border-color: #b94981; color: white; }
        .step-dot.active { background: #fff3cd; border-color: #f0ad4e; }
        .step-label { font-size: 11px; color: #888; margin-top: 5px; text-align: center; }
        .step-label.done { color: #b94981; font-weight: bold; }
        .step-line { flex: 1; height: 3px; background: #ddd; min-width: 20px; }
        .step-line.done { background: linear-gradient(to right, #b94981, #87b1d3); }

        .empty-orders { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 60px 20px; text-align: center; }
        .empty-orders .icon { font-size: 60px; margin-bottom: 14px; }
        .empty-orders h2 { color: #003a70; margin-bottom: 10px; }
        .empty-orders a { display: inline-block; margin-top: 18px; padding: 12px 28px; background: linear-gradient(135deg, #b94981, #87b1d3); color: white; border-radius: 10px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🏠 Home</a>
        <a href="cart.html">🛒 Cart</a>
        <a href="contact.html">Contact</a>
    </nav>

    <h1 class="page-title">My Orders</h1>
    <div class="container" id="ordersContainer">
        <div style="text-align:center;color:white;padding:30px;">Loading...</div>
    </div>

    <script>
        const STEPS = ['Pending', 'Confirmed', 'Preparing', 'Out for Delivery', 'Delivered'];
        const STEP_ICONS = ['⏳', '✔️', '👨‍🍳', '🚚', '🎉'];

        function statusClass(s) {
            return 'status-' + (s || 'pending').toLowerCase().replace(/\s+/g, '-');
        }

        function buildTracker(status) {
            const cur = STEPS.findIndex(s => s.toLowerCase() === (status || '').toLowerCase());
            let html = '<div class="tracker">';
            STEPS.forEach((step, i) => {
                const done   = i <= cur;
                const active = i === cur;
                if (i > 0) html += `<div class="step-line ${done ? 'done' : ''}"></div>`;
                html += `
                <div class="step">
                    <div class="step-dot ${done ? 'done' : (active ? 'active' : '')}">${STEP_ICONS[i]}</div>
                    <div class="step-label ${done ? 'done' : ''}">${step}</div>
                </div>`;
            });
            html += '</div>';
            return html;
        }

        function getMergedOrders() {
            // Read from allOrders (updated by admin) and fall back to myOrders
            const all   = JSON.parse(localStorage.getItem('allOrders') || '[]');
            const mine  = JSON.parse(localStorage.getItem('myOrders')  || '[]');
            // Merge: prefer allOrders version (has latest status), add any mine not in all
            const allIds = new Set(all.map(o => o.id || o.orderId));
            const extra  = mine.filter(o => !allIds.has(o.id || o.orderId));
            return [...all, ...extra];
        }

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            const loggedIn  = localStorage.getItem('userLoggedIn') === 'true';

            if (!loggedIn) {
                container.innerHTML = `
                    <div class="login-prompt">
                        <h2>Login to view your orders</h2>
                        <p>Track your order history and status here.</p>
                        <a href="login.html">Login Now</a>
                    </div>`;
                return;
            }

            const orders = getMergedOrders();

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-orders">
                        <h2>No orders yet</h2>
                        <p>Your order history will appear here once you place an order.</p>
                        <a href="index.html">Order Now</a>
                    </div>`;
                return;
            }

            let html = '';
            orders.forEach(order => {
                const items = order.items || order.orderItems || [];
                const status = order.status || 'Pending';
                html += `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">Order #${order.orderId || order.id}</div>
                            <div class="order-date">${order.date || ''} ${order.time || ''}</div>
                        </div>
                        <span class="status-badge ${statusClass(status)}">${status}</span>
                    </div>
                    <div class="order-items">
                        ${items.map(i => `<div class="order-item-row"><span>${i.productName || i.name} x${i.quantity}</span><span>₹${(i.price || i.unitPrice) * i.quantity}</span></div>`).join('')}
                        <div class="order-total"><span>Total</span><span>₹${order.totalAmount || order.total}</span></div>
                    </div>
                    ${buildTracker(status)}
                </div>`;
            });
            container.innerHTML = html;
        }

        renderOrders();
        // Auto-refresh every 10 seconds to pick up admin status changes
        setInterval(renderOrders, 10000);
    </script>
</body>
</html>
