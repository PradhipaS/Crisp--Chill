# ============================================
# DATABASE CONFIGURATION
# ============================================
# MySQL connection URL
# Format: jdbc:mysql://[host]:[port]/[database_name]
spring.datasource.url=jdbc:mysql://localhost:3306/Crisp_Chill

# MySQL username (change if different)
spring.datasource.username=root

# MySQL password (change to your MySQL password)
spring.datasource.password=root

# MySQL driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
# Show SQL queries in console (useful for debugging)
spring.jpa.show-sql=true

# Format SQL queries for readability
spring.jpa.properties.hibernate.format_sql=true

# Hibernate DDL auto (create, update, validate, none)
# - create: drops existing tables and creates new ones (use for first time)
# - update: updates schema without dropping data (use for development)
# - validate: only validates schema (use for production)
# - none: does nothing
spring.jpa.hibernate.ddl-auto=update

# Hibernate dialect for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# SERVER CONFIGURATION
# ============================================
# Port where backend will run
server.port=8080

# Application context path (optional)
# server.servlet.context-path=/api

# ============================================
# LOGGING CONFIGURATION
# ============================================
# Log level for application
logging.level.com.crispandchill=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# ============================================
# FILE UPLOAD CONFIGURATION (for images)
# ============================================
# Maximum file size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# CORS CONFIGURATION (handled in CorsConfig.java)
# ============================================
# Allow frontend to access backend from different port
# This is configured in Java code for better control

# ============================================
# CUSTOM APPLICATION PROPERTIES
# ============================================
# JWT secret key (for future authentication enhancement)
# app.jwt.secret=your-secret-key-here
# app.jwt.expiration=86400000

# ============================================
# NOTES:
# ============================================
# 1. Change spring.datasource.password to your MySQL password
# 2. Make sure MySQL is running on port 3306
# 3. Database 'crisp_chill_db' should exist (create it first)
# 4. For production, use environment variables instead of hardcoded values
# 5. Never commit passwords to version control
