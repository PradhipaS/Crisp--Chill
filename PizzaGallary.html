<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza - Crisp & Chill</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="js/cart.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{text-align:center;background:linear-gradient(to bottom right,#b94981,#87b1d3);font-family:"Merriweather",serif;color:black;}
        nav{background:rgba(250,214,214,0.7);padding:14px;font-size:15px;font-weight:bold;}
        nav a{margin:0 12px;text-decoration:none;color:rgb(36,21,88);}
        nav a:hover{color:#d179ae;}
        #nav-user{background:rgba(250,214,214,0.7);padding:5px;font-size:14px;text-align:center;}
        h1{margin:24px 0 10px;color:white;text-shadow:1px 1px 4px rgba(0,0,0,0.4);}
        .image-container{display:grid;padding:30px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:28px;justify-items:center;}
        .image{width:260px;background:linear-gradient(145deg,#ffe7c9,#ffd6ea);height:400px;border-radius:15px;border:2px solid rgba(255,255,255,0.6);padding:10px;box-shadow:0 8px 20px rgba(0,0,0,0.12);display:flex;flex-direction:column;justify-content:space-between;transition:transform 0.2s,box-shadow 0.3s;}
        .image:hover{transform:translateY(-8px);box-shadow:0 15px 30px rgba(120,50,0,0.25);}
        .image img{height:180px;width:100%;border-radius:10px;object-fit:cover;}
        .price{font-size:17px;font-weight:bold;color:#5a2d0c;}
        .btn{background:linear-gradient(135deg,#b94981,#87b1d3);color:white;padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;transition:0.3s;margin:3px 0;font-size:13px;}
        .btn:hover{opacity:0.85;}
    </style>
</head>
<body>
<nav id="main-nav">
    <a href="index.html">🏠 Home</a>
    <a href="cart.html">🛒 Cart <span id="cart-count" style="display:none;background:#ff4f9d;color:white;border-radius:50%;padding:1px 6px;font-size:11px;">0</span></a>
    <a href="orders.html">My Orders</a>
</nav>
<div id="nav-user" style="display:none;">Welcome, <span id="user-name"></span> | <a href="#" onclick="logout()">Logout</a></div>
<h1>🍕 Pizza Gallery</h1>
<div class="image-container">
    <div class="image"><img src="Images/margherita.jpg" alt="Margherita"><h4>Margherita Pizza</h4><p class="price">₹250</p><button class="btn" onclick="addToCart('Margherita Pizza',250,'Images/margherita.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Margherita Pizza',250)">Order Now</button></div>
    <div class="image"><img src="Images/pepperoni.jpg" alt="Pepperoni"><h4>Pepperoni Pizza</h4><p class="price">₹320</p><button class="btn" onclick="addToCart('Pepperoni Pizza',320,'Images/pepperoni.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Pepperoni Pizza',320)">Order Now</button></div>
    <div class="image"><img src="Images/veggie.jpg" alt="Veggie"><h4>Veggie Supreme</h4><p class="price">₹280</p><button class="btn" onclick="addToCart('Veggie Supreme',280,'Images/veggie.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Veggie Supreme',280)">Order Now</button></div>
    <div class="image"><img src="Images/bbq_chicken.jpg" alt="BBQ Chicken"><h4>BBQ Chicken Pizza</h4><p class="price">₹350</p><button class="btn" onclick="addToCart('BBQ Chicken Pizza',350,'Images/bbq_chicken.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('BBQ Chicken Pizza',350)">Order Now</button></div>
    <div class="image"><img src="Images/cheese_burst.jpg" alt="Cheese Burst"><h4>Cheese Burst Pizza</h4><p class="price">₹300</p><button class="btn" onclick="addToCart('Cheese Burst Pizza',300,'Images/cheese_burst.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Cheese Burst Pizza',300)">Order Now</button></div>
    <div class="image"><img src="Images/paneer_tikka.jpg" alt="Paneer Tikka"><h4>Paneer Tikka Pizza</h4><p class="price">₹330</p><button class="btn" onclick="addToCart('Paneer Tikka Pizza',330,'Images/paneer_tikka.jpg')">Add to Cart</button><button class="btn" onclick="orderNow('Paneer Tikka Pizza',330)">Order Now</button></div>
</div>
</body>
</html>
